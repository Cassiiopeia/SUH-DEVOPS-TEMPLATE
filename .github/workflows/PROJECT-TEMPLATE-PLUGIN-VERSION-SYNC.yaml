# ===================================================================
# PROJECT-TEMPLATE-PLUGIN-VERSION-SYNC.yaml
# 플러그인 매니페스트 버전 동기화 워크플로우 v1.0
# ===================================================================
#
# 이 워크플로우는 SUH-DEVOPS-TEMPLATE 저장소 전용입니다.
# template_integrator로 복사되지 않습니다.
#
# version.yml의 버전이 변경되면 다음 파일들을 자동 동기화합니다:
# - .claude-plugin/plugin.json
# - .claude-plugin/marketplace.json
#
# 트리거: deploy 브랜치 push 시
# (VERSION-CONTROL이 GITHUB_TOKEN으로 version.yml을 변경하면
#  후속 워크플로우가 트리거되지 않으므로 deploy push를 트리거로 사용)
# ===================================================================

name: PROJECT-TEMPLATE-PLUGIN-VERSION-SYNC

concurrency:
  group: plugin-version-sync
  cancel-in-progress: false

on:
  push:
    branches: ["deploy"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-plugin-version:
    name: 플러그인 버전 동기화
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 버전 관리 스크립트 권한 설정
        run: chmod +x .github/scripts/version_manager.sh

      - name: version.yml에서 버전 추출
        id: version
        run: |
          VERSION=$(./.github/scripts/version_manager.sh get | tail -n 1)
          if [ -z "$VERSION" ]; then
            echo "❌ version.yml에서 버전을 추출할 수 없습니다"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 현재 버전: $VERSION"

      - name: plugin.json 버전 동기화
        run: |
          PLUGIN_FILE=".claude-plugin/plugin.json"
          VERSION="${{ steps.version.outputs.version }}"

          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "⚠️ $PLUGIN_FILE 파일이 없습니다. 건너뜁니다."
            exit 0
          fi

          # jq가 있으면 사용, 없으면 sed로 대체
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.version = $v' "$PLUGIN_FILE" > tmp.json && mv tmp.json "$PLUGIN_FILE"
          else
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$PLUGIN_FILE"
          fi

          echo "✅ plugin.json 버전 동기화: $VERSION"

      - name: marketplace.json 버전 동기화
        run: |
          MARKETPLACE_FILE=".claude-plugin/marketplace.json"
          VERSION="${{ steps.version.outputs.version }}"

          if [ ! -f "$MARKETPLACE_FILE" ]; then
            echo "⚠️ $MARKETPLACE_FILE 파일이 없습니다. 건너뜁니다."
            exit 0
          fi

          # jq가 있으면 사용, 없으면 sed로 대체
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.plugins[0].version = $v' "$MARKETPLACE_FILE" > tmp.json && mv tmp.json "$MARKETPLACE_FILE"
          else
            # plugins 배열 내 version만 변경 (첫 번째 매칭)
            sed -i "0,/\"version\": \"[^\"]*\"/! { s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/; }" "$MARKETPLACE_FILE"
          fi

          echo "✅ marketplace.json 버전 동기화: $VERSION"

      - name: 변경사항 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json

          if git diff --staged --quiet; then
            echo "ℹ️ 플러그인 버전이 이미 동기화되어 있습니다."
          else
            VERSION="${{ steps.version.outputs.version }}"
            git commit -m "플러그인 매니페스트 버전 동기화: $VERSION [skip ci]"

            if git push; then
              echo "✅ 플러그인 버전 동기화 커밋 완료"
            else
              echo "❌ Push 실패"
              exit 1
            fi
          fi
