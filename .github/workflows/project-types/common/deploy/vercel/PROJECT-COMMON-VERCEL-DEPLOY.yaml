# ===================================================================
# PROJECT-COMMON-VERCEL-DEPLOY.yaml
# Vercel 배포 워크플로우 v1.0
# ===================================================================
#
# 프론트엔드 프로젝트(React/Next.js/Vite 등)를 Vercel 프로덕션으로 배포합니다.
# 타입 비종속 배포 타겟 — 마법사에서 배포 방식으로 vercel을 선택하면 설치됩니다.
# (실사용 검증 원본: passQL-Lab/passQL의 PROJECT-COMMON-VERCEL-DEPLOY)
#
# 필요 Secrets:
# - VERCEL_TOKEN      : Vercel Access Token (https://vercel.com/account/tokens)
# - VERCEL_ORG_ID     : 프로젝트의 .vercel/project.json의 orgId
# - VERCEL_PROJECT_ID : 프로젝트의 .vercel/project.json의 projectId
#   (로컬에서 `vercel link` 1회 실행하면 .vercel/project.json이 생성됩니다)
#
# PROJECT_PATH: 프론트 프로젝트가 서브폴더에 있으면 그 경로로 수정 (예: "client")
# ===================================================================

name: PROJECT-COMMON-VERCEL-DEPLOY

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    # @wizard paths-anchor (모노레포일 때 integrator가 paths 필터를 여기 주입)
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  PROJECT_PATH: "."      # 프론트 프로젝트 경로 (모노레포면 서브폴더, 예: "client")
  NODE_VERSION: "20"

jobs:
  deploy-production:
    name: Vercel 프로덕션 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 의존성 설치
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: 프로젝트 빌드
        working-directory: ${{ env.PROJECT_PATH }}
        run: npm run build

      - name: Vercel CLI 설치
        run: npm install -g vercel@latest

      - name: Vercel 프로덕션 배포
        id: deploy
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -oE "https://[^[:space:]]*\.vercel\.app" | tail -1)
          echo "deployment_url=${URL}" >> $GITHUB_OUTPUT

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "## 🚀 Vercel 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **배포 성공**" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 **URL**: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
            echo "- 📅 **시간**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **빌드 또는 배포 실패**" >> $GITHUB_STEP_SUMMARY
            echo "- 커밋: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 브랜치: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          fi
