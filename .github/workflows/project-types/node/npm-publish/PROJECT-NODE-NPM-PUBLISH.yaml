# ===================================================================
# PROJECT-NODE-NPM-PUBLISH.yaml
# npm 패키지 자동 배포 워크플로우 v1.0
# ===================================================================
#
# npm 라이브러리/CLI 패키지를 공개 npmjs 레지스트리에 자동 배포합니다.
#
# 동작:
# - version.yml 버전을 읽어 package.json에 주입 후 npm publish
# - 이미 레지스트리에 있는 버전이면 성공 종료 (멱등)
#
# 트리거: main 브랜치 push 시 (+ 수동 실행)
# - 릴리스 머지(develop→main) 시 README-VERSION-UPDATE 등과 동일 타이밍에 배포
# - VERSION-CONTROL이 GITHUB_TOKEN으로 version.yml을 변경하면
#   후속 워크플로우가 트리거되지 않으므로 main push를 트리거로 사용
#
# 필요 Secret:
# - NPM_TOKEN: npm Granular Access Token (2FA bypass 허용, publish 권한)
#   발급: https://www.npmjs.com/settings → Access Tokens → Generate New Token
# ===================================================================

name: PROJECT-NODE-NPM-PUBLISH

concurrency:
  group: npm-publish
  cancel-in-progress: false

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: npm 패키지 배포
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: version.yml에서 버전 추출
        id: version
        run: |
          chmod +x .github/scripts/version_manager.sh
          VERSION=$(./.github/scripts/version_manager.sh get | tail -n 1)
          if [ -z "$VERSION" ]; then
            echo "❌ version.yml에서 버전을 추출할 수 없습니다"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 배포 대상 버전: $VERSION"

      - name: package.json 버전 주입
        run: npm pkg set version=${{ steps.version.outputs.version }}

      - name: 이미 배포된 버전인지 확인 (멱등)
        id: check
        run: |
          PKG_NAME=$(npm pkg get name | tr -d '"')
          VERSION="${{ steps.version.outputs.version }}"
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "ℹ️ ${PKG_NAME}@${VERSION} 은 이미 배포되어 있습니다. 건너뜁니다."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: npm 배포
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 배포 결과 요약
        if: steps.check.outputs.skip == 'false'
        run: echo "✅ ${{ steps.check.outputs.pkg_name }}@${{ steps.version.outputs.version }} npm 배포 완료"
