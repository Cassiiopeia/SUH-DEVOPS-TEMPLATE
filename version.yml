# ===================================================================
# 프로젝트 버전 관리 파일
# ===================================================================
#
# 버전 형식: x.y.z (major.minor.patch)
#
# [자동] patch(3번째 자리): 워크플로우가 자동으로 증가시킴
# [자동] version_code: 빌드마다 자동 1씩 증가
#
# [수동] major/minor(1,2번째 자리)는 자동으로 올라가지 않습니다!
#       → 사용자가 이 파일에서 직접 수정해야 합니다
#       → 예: 1.0.5 → 1.1.0 또는 2.0.0 으로 올리고 싶으면 직접 수정
#
# 지원 타입: spring, flutter, next, react, react-native,
#           react-native-expo, node, python, basic
#
# [멀티타입] 한 레포에 여러 타입 공존 시 project_types 배열에 나열:
#           project_types: ["spring", "react", "python"]
#           → project_type(단수)은 항상 배열 첫 항목으로 자동 미러링됨 (직접 수정 금지)
#
# 타입별 동기화 파일:
# - spring: build.gradle
# - flutter: pubspec.yaml
# - next/react/node: package.json
# - react-native: Info.plist, build.gradle
# - react-native-expo: app.json
# - python: pyproject.toml
# - basic: version.yml만 사용
# ===================================================================

version: "3.0.104"
version_code: 296 # app build number
project_types: ["basic"] # 멀티타입 배열 — 첫 항목이 primary, 직접 편집 가능
project_type: "basic" # project_types[0] 자동 미러 — 직접 수정 금지 (spring, flutter, next, react, react-native, react-native-expo, node, python, basic)
